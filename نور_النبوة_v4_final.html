<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>نور النبوة التفاعلي</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#fbbf24;--gold2:#d4a017;--gold-glow:rgba(251,191,36,.35);
  --blue:#38bdf8;--purple:#a78bfa;--emerald:#34d399;--fire:#ef4444;
  --navy:#020c1e;--navy2:#05152e;--navy3:#0a1f40;
  --border-gold:rgba(212,160,23,.3);--text:#f0f4ff;--text2:#8fabd4;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:"Cairo",sans-serif;background:var(--navy);color:var(--text)}
/* STARS */
#starbg{position:fixed;inset:0;z-index:0;pointer-events:none}
.st{position:absolute;border-radius:50%;background:#fff;animation:tw var(--d,3s) ease-in-out infinite var(--dl,0s);opacity:0}
@keyframes tw{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.75;transform:scale(1.5)}}
/* TAQWA BAR */
#tqbar{position:fixed;top:12px;right:12px;z-index:600;background:rgba(2,12,30,.92);border:1px solid var(--border-gold);border-radius:20px;padding:5px 12px;display:flex;align-items:center;gap:7px;backdrop-filter:blur(8px)}
.tql{font-size:.82rem;color:var(--gold);font-weight:700}
.tqtrack{width:70px;height:7px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.tqfill{height:100%;background:linear-gradient(90deg,#10b981,#fbbf24);border-radius:4px;width:0%;transition:width .5s}
.tqnum{font-size:.82rem;color:var(--gold);font-weight:800;min-width:22px;text-align:center}
/* BADGES */
#bdgbar{position:fixed;top:12px;left:12px;z-index:600;display:flex;gap:4px;flex-wrap:wrap;max-width:180px}
.bdg{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:.9rem;opacity:.28;filter:grayscale(1);transition:all .4s;cursor:help}
.bdg.on{opacity:1;filter:none;border-color:var(--gold);box-shadow:0 0 10px var(--gold-glow);animation:bpop .5s ease-out}
@keyframes bpop{0%{transform:scale(0) rotate(-30deg)}65%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
/* APP */
#app{position:relative;z-index:1;width:100%;height:100%}
.scr{position:absolute;inset:0;display:none;overflow:hidden}
.scr.on{display:flex;flex-direction:column;align-items:center;justify-content:center}
/* COVER */
#cvr{background:radial-gradient(ellipse at 40% 30%,#0a1f45 0%,#020c1e 65%)}
.cvr-rays{position:absolute;inset:0;background:conic-gradient(from 0deg at 50% 42%,transparent 0deg,rgba(212,160,23,.035) 18deg,transparent 36deg,rgba(212,160,23,.035) 54deg,transparent 72deg,rgba(212,160,23,.035) 90deg,transparent 108deg,rgba(212,160,23,.035) 126deg,transparent 144deg,rgba(212,160,23,.035) 162deg,transparent 180deg,rgba(212,160,23,.035) 198deg,transparent 216deg,rgba(212,160,23,.035) 234deg,transparent 252deg,rgba(212,160,23,.035) 270deg,transparent 288deg,rgba(212,160,23,.035) 306deg,transparent 324deg,rgba(212,160,23,.035) 342deg,transparent 360deg);animation:spin 50s linear infinite;pointer-events:none}
@keyframes spin{to{transform:rotate(360deg)}}
.orb{width:130px;height:130px;border-radius:50%;background:radial-gradient(circle,rgba(255,230,100,.95),rgba(251,191,36,.6) 35%,rgba(180,90,0,.25) 65%,transparent 80%);box-shadow:0 0 60px 20px rgba(251,191,36,.45),0 0 120px 50px rgba(251,120,0,.18);animation:orbP 3s ease-in-out infinite;position:relative;z-index:2;display:flex;align-items:center;justify-content:center;font-family:Amiri,serif;font-size:3.5rem;color:rgba(5,15,30,.8);margin-bottom:20px}
@keyframes orbP{0%,100%{transform:scale(1);box-shadow:0 0 60px 20px rgba(251,191,36,.45)}50%{transform:scale(1.06);box-shadow:0 0 90px 35px rgba(251,191,36,.6)}}
.cvr-title{font-family:Amiri,serif;font-size:clamp(1.8rem,5.5vw,3rem);font-weight:700;color:var(--gold);text-align:center;text-shadow:0 0 40px rgba(251,191,36,.5);line-height:1.3;position:relative;z-index:2;margin-bottom:6px}
.cvr-sub{font-size:clamp(.78rem,2vw,.98rem);color:var(--text2);text-align:center;max-width:340px;margin-bottom:22px;position:relative;z-index:2}
.cvr-div{display:flex;align-items:center;gap:10px;margin-bottom:22px;z-index:2;width:280px}
.div-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.div-gem{width:8px;height:8px;background:var(--gold);transform:rotate(45deg);box-shadow:0 0 8px var(--gold-glow)}
.cvr-chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;max-width:360px;z-index:2;margin-bottom:26px}
.chip{background:rgba(212,160,23,.08);border:1px solid rgba(212,160,23,.22);border-radius:18px;padding:4px 12px;font-size:.74rem;color:rgba(251,191,36,.82)}
.btn-go{background:linear-gradient(135deg,var(--gold2),#b45309);border:2px solid var(--gold);border-radius:50px;padding:13px 46px;font-family:Cairo,sans-serif;font-size:1.05rem;font-weight:900;color:var(--navy);cursor:pointer;z-index:2;box-shadow:0 0 28px rgba(212,160,23,.5);transition:all .3s;letter-spacing:.5px}
.btn-go:hover{transform:scale(1.04);box-shadow:0 0 48px rgba(212,160,23,.7)}
/* SELECTION */
#sel{background:var(--navy);overflow-y:auto;justify-content:flex-start;padding:65px 14px 20px}
.sel-hdr{text-align:center;margin-bottom:16px;width:100%}
.sel-hdr h2{font-family:Amiri,serif;font-size:1.45rem;color:var(--gold);margin-bottom:3px;text-shadow:0 0 18px rgba(251,191,36,.3)}
.sel-hdr p{color:var(--text2);font-size:.78rem}
.tabs{display:flex;gap:7px;justify-content:center;margin-bottom:16px;width:100%}
.tab{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:5px 16px;font-family:Cairo,sans-serif;font-size:.76rem;color:var(--text2);cursor:pointer;transition:all .2s}
.tab.on{background:rgba(212,160,23,.14);border-color:rgba(212,160,23,.4);color:var(--gold)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:10px;width:100%;max-width:680px}
.card{background:linear-gradient(145deg,rgba(255,255,255,.045),rgba(255,255,255,.01));border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:16px 10px;text-align:center;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,var(--cc,rgba(251,191,36,.1)) 0%,transparent 70%);opacity:0;transition:opacity .3s}
.card:hover:not(.lk){transform:translateY(-4px);box-shadow:0 10px 26px rgba(0,0,0,.3);border-color:var(--cc,var(--gold))}
.card:hover:not(.lk)::before{opacity:1}
.card.lk{opacity:.4;cursor:default}
.card.lk::after{content:"🔒";position:absolute;top:5px;left:5px;font-size:.8rem}
.card.done{border-color:rgba(52,211,153,.4)}
.card-ic{font-size:2rem;margin-bottom:7px;display:block;animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.card-nm{font-family:Amiri,serif;font-size:.95rem;color:var(--text);font-weight:700;margin-bottom:3px}
.card-vl{font-size:.68rem;color:var(--text2);background:rgba(255,255,255,.04);border-radius:7px;padding:2px 7px;display:inline-block}
.card-st{display:flex;gap:2px;justify-content:center;margin-top:5px}
.cs{font-size:.8rem;color:rgba(251,191,36,.22)}.cs.e{color:var(--gold)}
.done-ck{position:absolute;top:5px;right:5px;width:16px;height:16px;background:var(--emerald);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:.55rem;color:var(--navy);font-weight:900}
.card.done .done-ck{display:flex}
/* STORY */
#story{background:var(--navy);padding:0}
.snav{position:absolute;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:linear-gradient(to bottom,rgba(2,12,30,.98),rgba(2,12,30,.55),transparent)}
.bbtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.11);border-radius:50%;width:35px;height:35px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:.95rem;transition:all .2s}
.bbtn:hover{border-color:var(--gold);color:var(--gold)}
.snav-title{font-family:Amiri,serif;font-size:.95rem;color:var(--gold);text-shadow:0 0 14px rgba(251,191,36,.4)}
.dots{display:flex;gap:4px}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .3s;cursor:pointer}
.dot.on{background:var(--gold);box-shadow:0 0 6px var(--gold-glow);transform:scale(1.3)}
.pwrap{width:100%;height:100%;position:relative;perspective:1200px}
.page{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
.page.on{display:flex}
/* الجزء البصري يأخذ كل المساحة المتبقية فوق لوحة النصوص */
.vis{position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:0;flex-shrink:0;height:calc(100% - var(--cov-h,220px))}
/* لوحة النصوص السفلية — ارتفاع ثابت قابل للتمرير */
.cov{position:absolute;bottom:0;left:0;right:0;z-index:20;max-height:62%;overflow-y:auto;padding:12px 12px 10px;background:linear-gradient(to top,rgba(2,12,30,1) 0%,rgba(2,12,30,.95) 70%,rgba(2,12,30,.7) 100%);border-top:1px solid rgba(212,160,23,.08)}
.vbox{background:rgba(212,160,23,.07);border:1px solid rgba(212,160,23,.2);border-radius:9px;padding:8px 12px;margin-bottom:8px;font-family:Amiri,serif;font-size:clamp(.78rem,.9rem,1rem);color:var(--gold);line-height:1.85;text-align:center}
.stxt{font-size:clamp(.78rem,.86rem,1rem);color:var(--text2);line-height:1.72;margin-bottom:9px}
.stxt strong{color:var(--text)}
.hbox{display:flex;align-items:center;gap:7px;background:rgba(56,189,248,.07);border:1px solid rgba(56,189,248,.18);border-radius:8px;padding:6px 10px;margin-bottom:8px;font-size:clamp(.7rem,.77rem,1rem);color:var(--blue);animation:hblink 2.5s ease-in-out infinite}
@keyframes hblink{0%,100%{border-color:rgba(56,189,248,.18)}50%{border-color:rgba(56,189,248,.5)}}
.vpill{display:inline-flex;align-items:center;gap:5px;background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.22);border-radius:12px;padding:3px 10px;font-size:.7rem;color:var(--emerald);margin-bottom:8px}
.navr{display:flex;gap:8px;position:sticky;bottom:0;padding-top:6px;background:rgba(2,12,30,.95)}
.bnxt,.bprv{flex:1;padding:9px 6px;border-radius:9px;font-family:Cairo,sans-serif;font-size:clamp(.8rem,.88rem,1rem);font-weight:800;border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px}
.bnxt{background:linear-gradient(135deg,var(--gold2),#b45309);color:var(--navy);box-shadow:0 4px 14px rgba(212,160,23,.28)}
.bnxt:hover{transform:scale(1.02);box-shadow:0 6px 20px rgba(212,160,23,.42)}
.bprv{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--text)}
/* REWARD */
#rwd{position:fixed;inset:0;z-index:700;display:none;align-items:center;justify-content:center;background:rgba(2,12,30,.86);backdrop-filter:blur(10px)}
#rwd.on{display:flex}
.rbox{background:linear-gradient(145deg,#071030,#030c22);border:2px solid var(--gold);border-radius:26px;padding:34px 26px;text-align:center;max-width:330px;width:92%;box-shadow:0 0 70px rgba(212,160,23,.28);animation:rIn .5s ease-out}
@keyframes rIn{from{transform:scale(.75);opacity:0}to{transform:scale(1);opacity:1}}
.ric{font-size:3.8rem;display:block;animation:bpop .7s ease-out}
.rtitle{font-family:Amiri,serif;font-size:1.5rem;color:var(--gold);margin:11px 0 5px}
.rval{background:rgba(52,211,153,.09);border:1px solid rgba(52,211,153,.28);border-radius:13px;padding:5px 16px;font-size:.82rem;color:var(--emerald);display:inline-block;margin-bottom:10px}
.rmsg{color:var(--text2);font-size:.85rem;line-height:1.6;margin-bottom:18px}
.rclose{background:linear-gradient(135deg,var(--gold2),#b45309);border:none;border-radius:28px;padding:10px 32px;font-family:Cairo,sans-serif;font-size:.92rem;font-weight:800;color:var(--navy);cursor:pointer;box-shadow:0 0 18px rgba(212,160,23,.38);transition:all .3s}
.rclose:hover{transform:scale(1.04)}
/* SCENE GENERICS */
canvas.mc{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.scene{width:100%;height:100%;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.aura{position:absolute;border-radius:50%;animation:auraPulse 3s ease-in-out infinite}
@keyframes auraPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.9;transform:scale(1.1)}}
/* VALUE PAGE — صفحة القيمة تملأ .vis كاملاً وتسمح بالتمرير داخلياً */
.vpage{width:100%;height:100%;background:radial-gradient(ellipse at 50% 40%,#071530,#020c1e);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:16px 16px 12px;text-align:center;overflow-y:auto;gap:8px}
.vic{font-size:3.2rem;flex-shrink:0;animation:orbP 2s ease-out}
.vtitle{font-family:Amiri,serif;font-size:clamp(1.2rem,1.7rem,2rem);color:var(--gold);text-shadow:0 0 18px rgba(251,191,36,.4);line-height:1.3}
.vdesc{color:var(--text2);font-size:clamp(.78rem,.85rem,1rem);line-height:1.75;max-width:310px}
.vhadith{background:rgba(212,160,23,.06);border-right:3px solid var(--gold);border-radius:8px;padding:9px 12px;font-family:Amiri,serif;color:rgba(251,191,36,.88);font-size:clamp(.78rem,.88rem,1rem);line-height:1.85;text-align:right;max-width:310px;width:100%}
/* QUIZ */
.qwrap{width:100%;max-width:320px}
.qq{font-family:Amiri,serif;font-size:clamp(.88rem,1rem,1.1rem);color:var(--text);text-align:center;margin-bottom:10px;line-height:1.6}
.qopts{display:flex;flex-direction:column;gap:6px}
.qopt{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:9px;padding:9px 12px;cursor:pointer;font-size:clamp(.76rem,.84rem,1rem);color:var(--text);transition:all .2s;text-align:right;line-height:1.5}
.qopt:hover:not(.answered){background:rgba(255,255,255,.09);border-color:var(--blue)}
.qopt.correct{background:rgba(52,211,153,.11);border-color:var(--emerald);color:var(--emerald)}
.qopt.wrong{background:rgba(239,68,68,.08);border-color:#ef4444;color:#f87171}
/* FACELESS ART */
.fs-scene{width:100%;height:100%;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
/* NOAH */
.noah-bg{width:100%;height:100%;background:linear-gradient(180deg,#2a1500,#6b3a00 40%,#c4962a 100%);position:relative;overflow:hidden;cursor:pointer}
.noah-sun{width:75px;height:75px;background:radial-gradient(circle,#ffd700,#ff8c00);border-radius:50%;position:absolute;top:12%;right:18%;box-shadow:0 0 45px rgba(255,200,0,.65);animation:sunb 5s ease-in-out infinite}
@keyframes sunb{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
/* IBRAHIM FIRE */
.fire-bg{width:100%;height:100%;background:radial-gradient(ellipse at 50% 60%,#3d0808,#150202 100%);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer}
.fwrap{position:relative;width:170px;height:210px}
.fl{position:absolute;bottom:0;border-radius:50% 50% 20% 20%;transform-origin:bottom center;animation:fla 1.5s ease-in-out infinite}
.fl1{width:105px;height:185px;left:33px;background:radial-gradient(ellipse at bottom,#ff5500,#cc0000,transparent);animation-delay:0s}
.fl2{width:80px;height:155px;left:45px;background:radial-gradient(ellipse at bottom,#ff8800,#ff3300,transparent);animation-delay:.2s}
.fl3{width:60px;height:125px;left:55px;background:radial-gradient(ellipse at bottom,#ffd700,#ff8800,transparent);animation-delay:.35s}
.fl4{width:42px;height:90px;left:64px;background:radial-gradient(ellipse at bottom,#fff,#ffd700,transparent);animation-delay:.15s}
@keyframes fla{0%,100%{transform:scaleX(1) scaleY(1) translateY(0)}30%{transform:scaleX(.93) scaleY(1.04) translateY(-5px)}60%{transform:scaleX(1.04) scaleY(.97) translateY(-3px)}}
.fcenter{position:absolute;width:48px;height:48px;background:radial-gradient(circle,rgba(255,255,255,.95),rgba(56,189,248,.5),transparent);border-radius:50%;top:45%;left:50%;transform:translate(-50%,-50%);animation:fcg 2s ease-in-out infinite;z-index:5}
@keyframes fcg{0%,100%{opacity:.7;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.32)}}
.cool-ov{position:absolute;inset:0;background:linear-gradient(135deg,rgba(59,130,246,.6),rgba(52,211,153,.42));opacity:0;transition:opacity 1.8s;pointer-events:none}
/* MOSES */
.sea-bg{width:100%;height:100%;background:linear-gradient(180deg,#1a0a2e,#060a22 100%);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
/* HIRA */
.hira-bg{width:100%;height:100%;background:radial-gradient(ellipse at 50% 60%,#0d0520,#020818 100%);position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer}
/* KAABA */
.kaaba-bg{width:100%;height:100%;background:radial-gradient(ellipse at 50% 40%,#080820,#020818 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
/* SCAVENGER */
.scav{position:absolute;font-size:1.45rem;cursor:pointer;animation:scf var(--sfd,3.5s) ease-in-out infinite var(--sdd,0s);filter:drop-shadow(0 0 7px rgba(251,191,36,.45));z-index:14}
@keyframes scf{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1.1)}}
.scav.found{opacity:0!important;pointer-events:none;transition:opacity .3s}
.shud{position:absolute;top:8px;right:8px;background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.28);border-radius:11px;padding:3px 9px;font-size:.68rem;color:var(--gold);z-index:18;font-family:Cairo,sans-serif}
@media(max-width:400px){.grid{grid-template-columns:repeat(2,1fr)}.cvr-title{font-size:1.6rem}}

/* ═══ FLIPBOOK ═══ */
.page{transform-style:preserve-3d;backface-visibility:hidden}
@keyframes flipRight{
  0%  {transform:rotateY(0deg) scale(1);opacity:1}
  40% {transform:rotateY(-90deg) scale(.95);opacity:.4}
  100%{transform:rotateY(0deg) scale(1);opacity:1}
}
@keyframes flipLeft{
  0%  {transform:rotateY(0deg) scale(1);opacity:1}
  40% {transform:rotateY(90deg) scale(.95);opacity:.4}
  100%{transform:rotateY(0deg) scale(1);opacity:1}
}
.flip-r{animation:flipRight .42s ease-in-out}
.flip-l{animation:flipLeft  .42s ease-in-out}
/* page-turn shadow overlay */
.page-shadow{position:absolute;inset:0;pointer-events:none;z-index:99;background:linear-gradient(90deg,rgba(0,0,0,.35),transparent);opacity:0;transition:opacity .42s}

/* ═══ SOUND TOGGLE ═══ */
#soundbtn{position:fixed;bottom:14px;right:14px;z-index:650;width:38px;height:38px;border-radius:50%;background:rgba(2,12,30,.92);border:1px solid var(--border-gold);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;backdrop-filter:blur(8px);transition:all .25s;box-shadow:0 0 12px rgba(212,160,23,.2)}
#soundbtn:hover{border-color:var(--gold);box-shadow:0 0 20px rgba(212,160,23,.4)}

/* ═══ SOUND RIPPLE ═══ */
@keyframes ripple{0%{transform:scale(0);opacity:.7}100%{transform:scale(2.8);opacity:0}}
.sripple{position:fixed;width:60px;height:60px;border-radius:50%;background:rgba(212,160,23,.25);pointer-events:none;z-index:900;transform:scale(0);animation:ripple .5s ease-out forwards}
</style>
</head>
<body>
<div id="starbg"></div>
<button id="soundbtn" title="الصوت" onclick="toggleSound()">🔊</button>
<div id="tqbar"><span class="tql">🌟 نقاط التقوى:</span><div class="tqtrack"><div class="tqfill" id="tqf"></div></div><span class="tqnum" id="tqn">0</span></div>
<div id="bdgbar">
  <div class="bdg" id="b-sabr" title="الصبر">⏳</div>
  <div class="bdg" id="b-iqan" title="اليقين">🔥</div>
  <div class="bdg" id="b-shja" title="الشجاعة">⚡</div>

var _ac=null,_muted=localStorage.getItem("nrmute")==="1";
function getAC(){if(!_ac){try{_ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return _ac;}
function toggleSound(){_muted=!_muted;localStorage.setItem("nrmute",_muted?"1":"0");document.getElementById("soundbtn").textContent=_muted?"🔇":"🔊";}

function _beep(freq,dur,type,vol,attack,decay){
  var ac=getAC();if(!ac||_muted)return;
  try{
    var o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type=type||"sine";o.frequency.setValueAtTime(freq,ac.currentTime);
    var v=vol||0.18,a=attack||0.01,d=decay||dur;
    g.gain.setValueAtTime(0,ac.currentTime);
    g.gain.linearRampToValueAtTime(v,ac.currentTime+a);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+a+d);
    o.start(ac.currentTime);o.stop(ac.currentTime+a+d+0.01);
  }catch(e){}
}
function _noise(dur,vol){
  var ac=getAC();if(!ac||_muted)return;
  try{
    var buf=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate),d=buf.getChannelData(0);
    for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(vol||0.06);
    var src=ac.createBufferSource(),g=ac.createGain(),fil=ac.createBiquadFilter();
    fil.type="bandpass";fil.frequency.value=1200;fil.Q.value=0.6;
    src.buffer=buf;src.connect(fil);fil.connect(g);g.connect(ac.destination);
    g.gain.setValueAtTime(vol||0.06,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    src.start();src.stop(ac.currentTime+dur+0.01);
  }catch(e){}
}

/* ═══ BUILD GRIDS ═══ */
function buildGrids(){
  var pg=document.getElementById("pgrid");
  pg.innerHTML=PROPHETS.map(function(p){
    var done=EARNED.includes(p.id);
    var st=[1,2,3].map(function(i){return '<span class="cs'+(done&&i<=3?" e":"")+'">★</span>';}).join("");
    var clickable=p.avail?(' data-action="start" data-val="'+p.id+'"'):"";
    return '<div class="card'+(p.avail?"":" lk")+(done?" done":"")+" "+p.id+'" style="--cc:'+p.color+'"'+clickable+'>'
      +'<div class="done-ck">✓</div>'
      +'<span class="card-ic">'+p.icon+'</span>'
      +'<div class="card-nm">'+p.name+'</div>'
      +'<div class="card-vl">'+p.val+'</div>'
      +'<div class="card-st">'+st+"</div>"
      +"</div>";
  }).join("");
  var sg=document.getElementById("sgrid");
  sg.innerHTML=SAHABA.map(function(s){
    var done=EARNED.includes(s.id);
    return '<div class="card'+(done?" done":"")+" "+s.id+'" style="--cc:'+s.color+'" data-action="start" data-val="'+s.id+'">'
      +'<div class="done-ck">✓</div>'
      +'<span class="card-ic">'+s.icon+'</span>'
      +'<div class="card-nm">'+s.name+'</div>'
      +'<div class="card-vl">'+s.val+'</div>'
      +'<div style="font-size:.62rem;color:var(--text2);margin-top:3px">'+s.grp+'</div>'
      +"</div>";
  }).join("");
}
function startStory(id){
  sndOpen();
  CUR_ID=id;CUR_P=0;
  var all=PROPHETS.concat(SAHABA);
  var p=all.find(function(x){return x.id===id;});
  document.getElementById("stitle").textContent=p.full;
  CUR_PAGES=getPages(id);
  renderPages();go("story");showPageN(0);
}
function renderPages(){
  var wrap=document.getElementById("pwrap");
  wrap.innerHTML=CUR_PAGES.map(function(p,i){
    return '<div class="page'+(i===0?" on":"")+'" id="pg'+i+'">'
      +'<div class="vis">'+p.visual+"</div>"
      +'<div class="cov">'
        +(p.hint?'<div class="hbox">👆 '+p.hint+"</div>":"")
        +(p.verse?'<div class="vbox">'+p.verse+"</div>":"")
        +(p.vpill?'<div class="vpill">💎 '+p.vpill+"</div>":"")
        +(p.text?'<p class="stxt">'+p.text+"</p>":"")
        +'<div class="navr">'
          +(i>0?'<button class="bprv" data-action="prev">السابق →</button>':"")
          +'<button class="bnxt" data-action="next">'+(i<CUR_PAGES.length-1?"← التالي":"أنهيت القصة ⭐")+"</button>"
        +"</div>"
      +"</div></div>";
  }).join("");

function showPageN(n){
  var dir = n > CUR_P ? "r" : "l";
  var cur=document.getElementById("pg"+CUR_P);
  var nxt=document.getElementById("pg"+n);
  if(!nxt)return;
  if(cur && cur!==nxt){

    cur.classList.remove("on");
    nxt.classList.add("on");
    nxt.classList.add(cls);
    nxt.addEventListener("animationend",function once(){nxt.classList.remove(cls);nxt.removeEventListener("animationend",once);});

  }
  document.querySelectorAll(".dot").forEach(function(d,i){d.classList.toggle("on",i===n);});

}

function initRainScene(){
  var canvas=document.getElementById("rcanvas");if(!canvas)return;
  canvas.width=canvas.offsetWidth||320;canvas.height=canvas.offsetHeight||360;
  var ctx=canvas.getContext("2d"),drops=[],wl=0,raining=false,fastFlood=false;
  function addDrop(){drops.push({x:Math.random()*canvas.width,y:-10,sp:7+Math.random()*6,len:12+Math.random()*13,a:.3+Math.random()*.5});}
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(raining){
      if(Math.random()<.32)addDrop();
      drops.forEach(function(d,i){ctx.strokeStyle="rgba(150,200,255,"+d.a+")";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x-2,d.y+d.len);ctx.stroke();d.y+=d.sp;if(d.y>canvas.height)drops.splice(i,1);});
      if(wl<canvas.height*.58)wl+=(fastFlood?5:.18);
      ctx.fillStyle="rgba(30,100,180,.38)";ctx.fillRect(0,canvas.height-wl,canvas.width,wl);
      ctx.strokeStyle="rgba(80,160,220,.4)";ctx.lineWidth=1.5;ctx.beginPath();
      for(var x=0;x<=canvas.width;x+=6)ctx.lineTo(x,canvas.height-wl+Math.sin(x*.04+Date.now()*.003)*6);
      ctx.stroke();
      var ark=document.getElementById("noahark");if(ark&&wl>55)ark.style.bottom=(28+wl/8)+"%";
    }
    activeAnimations.push(requestAnimationFrame(draw));
  }
  draw();
  var sc=document.getElementById("noahscene");if(sc)sc.addEventListener("click",function(){raining=true;sc.style.background="linear-gradient(180deg,#0a1520,#050a18)";addTQ(5);});var arkEl=document.getElementById("noahark");if(arkEl)arkEl.addEventListener("click",function(ev){ev.stopPropagation();raining=true;fastFlood=true;if(sc)sc.style.background="linear-gradient(180deg,#0a1520,#050a18)";addTQ(5);});
}

function initFireScene(){

    var co=document.getElementById("cool-ov");if(co)co.style.opacity="1";
    document.querySelectorAll(".fl").forEach(function(f){f.style.transition="all 1.8s";f.style.opacity=".22";f.style.filter="hue-rotate(200deg) saturate(.5)";});

    addTQ(5);

}

function initSeaScene(){
  var canvas=document.getElementById("scanvas");if(!canvas)return;
  canvas.width=canvas.offsetWidth||320;canvas.height=canvas.offsetHeight||360;
  var ctx=canvas.getContext("2d"),t=0,prog=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(!seaParted){for(var row=0;row<7;row++){var y=canvas.height*.28+row*27;ctx.fillStyle="rgba(20,70,140,"+(0.12+row*.038)+")";ctx.beginPath();for(var x=0;x<=canvas.width;x+=6)ctx.lineTo(x,y+Math.sin(x*.04+t*.05+row*.4)*7);ctx.lineTo(canvas.width,canvas.height);ctx.lineTo(0,canvas.height);ctx.closePath();ctx.fill();}}
    else{if(prog<1)prog+=.012;var gap=canvas.width*.47*prog,cx=canvas.width/2;ctx.fillStyle="rgba(25,90,160,.7)";ctx.fillRect(0,0,cx-gap,canvas.height);for(var i=0;i<4;i++){ctx.fillStyle="rgba(255,200,60,.78)";ctx.beginPath();ctx.arc(18+i*11,80+i*38+Math.sin(t*.05+i)*9,4,0,Math.PI*2);ctx.fill();}ctx.fillStyle="rgba(25,90,160,.7)";ctx.fillRect(cx+gap,0,canvas.width-(cx+gap),canvas.height);for(var j=0;j<4;j++){ctx.fillStyle="rgba(255,200,60,.78)";ctx.beginPath();ctx.arc(canvas.width-18-j*11,90+j*34+Math.sin(t*.05+j+1)*9,4,0,Math.PI*2);ctx.fill();}var g=ctx.createLinearGradient(cx-gap,0,cx+gap,0);g.addColorStop(0,"rgba(56,189,248,.18)");g.addColorStop(.5,"rgba(56,189,248,.04)");g.addColorStop(1,"rgba(56,189,248,.18)");ctx.fillStyle=g;ctx.fillRect(cx-gap,0,gap*2,canvas.height);}
    t++;activeAnimations.push(requestAnimationFrame(draw));
  }
  draw();
  var stf=document.getElementById("staffbtn");if(stf)stf.addEventListener("click",function(){if(seaParted)return;seaParted=true;stf.style.animation="none";stf.style.filter="drop-shadow(0 0 55px rgba(56,189,248,1)) drop-shadow(0 0 80px rgba(251,191,36,.7))";var si=document.getElementById("seainstr");if(si)si.textContent="﴿فَانفَلَقَ فَكَانَ كُلُّ فِرْقٍ كَالطَّوْدِ الْعَظِيمِ﴾";var _armyico=document.getElementById("armyico");if(_armyico)_armyico.remove();addTQ(5);});
}

function initMarketScene(){
  var canvas=document.getElementById("mktcanvas");var sc=document.getElementById("mktscene");if(!canvas||!sc)return;
  canvas.width=canvas.offsetWidth||320;canvas.height=canvas.offsetHeight||360;
  var ctx=canvas.getContext("2d"),particles=[];
  sc.addEventListener("click",function(){for(var i=0;i<32;i++){var a=Math.random()*Math.PI*2,sp=1.5+Math.random()*2.8;particles.push({x:canvas.width/2,y:canvas.height/2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:2+Math.random()*3.5,a:1,color:"hsl("+(35+Math.random()*20)+",100%,"+(60+Math.random()*30)+"%)"});}addTQ(3);});
  function anim(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(function(p){if(p.a<=0)return;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);var col=p.color.replace("hsl","hsla").replace(")","," +p.a+")");ctx.fillStyle=col;ctx.fill();p.x+=p.vx;p.y+=p.vy;p.a-=.016;p.r*=.99;});activeAnimations.push(requestAnimationFrame(anim));}
  anim();
}

function facelessSVG(color1,color2,angle,hasStaff,hasShield,hasSword){
  var c1=color1||"#3a3a4a",c2=color2||"#252535";
  return '<svg width="95" height="220" viewBox="0 0 95 220" style="z-index:5">'
    +'<defs><linearGradient id="fg'+Date.now()%999+'" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="'+c1+'"/><stop offset="100%" stop-color="'+c2+'"/></linearGradient></defs>'
    +'<ellipse cx="47" cy="180" rx="30" ry="42" fill="'+c1+'" opacity=".88"/>'
    +'<rect x="20" y="95" width="55" height="90" rx="7" fill="'+c1+'" opacity=".9" transform="rotate('+(angle||0)+' 47 140)"/>'
    +'<ellipse cx="47" cy="92" rx="32" ry="13" fill="'+c2+'" opacity=".8"/>'
    +'<ellipse cx="47" cy="63" rx="20" ry="24" fill="'+c2+'" opacity=".88"/>'
    +(hasStaff?'<line x1="80" y1="55" x2="84" y2="222" stroke="#7a6030" stroke-width="5" stroke-linecap="round"/><ellipse cx="82" cy="53" rx="6" ry="6" fill="#5a4020" opacity=".8"/>':'')
    +(hasShield?'<ellipse cx="78" cy="130" rx="20" ry="26" fill="'+c1+'" opacity=".7" transform="rotate(-15 78 130)"/><ellipse cx="78" cy="130" rx="16" ry="22" fill="none" stroke="rgba(56,189,248,.38)" stroke-width="2" transform="rotate(-15 78 130)"/>':'')
    +(hasSword?'<rect x="14" y="100" width="6" height="70" rx="3" fill="#8a9ab0" opacity=".7" transform="rotate(15 17 135)"/>':'')
    +'</svg>';
}

function sahaba_scene(bg,auraColor,svgArgs,label){
  return '<div class="fs-scene" style="background:'+bg+'">'
    +'<div class="aura" style="width:200px;height:200px;top:10%;left:50%;margin-left:-100px;background:radial-gradient(circle,'+auraColor+',transparent 70%)"></div>'
    +facelessSVG(...svgArgs)
    +'<div style="position:absolute;bottom:11%;left:0;right:0;text-align:center;font-family:Amiri,serif;font-size:.78rem;color:rgba(212,160,23,.62)">'+label+'</div>'
    +'</div>';
}

window.toggleSound=toggleSound;
window.go=go;window.showTab=showTab;window.startStory=startStory;
window.closeR=closeR;window.nextP=nextP;window.prevP=prevP;
window.addTQ=addTQ;window.awardBdg=awardBdg;window.buildGrids=buildGrids;

/* EXTRA GLOBAL ALIASES */
window.prevP=prevP;window.nextP=nextP;window.showPageN=showPageN;
window.initInteractions=initInteractions;
/* Event delegation for dynamic elements */
document.addEventListener('click',function(e){
  var t=e.target.closest('[data-action]');
  if(!t)return;
  var act=t.dataset.action,val=t.dataset.val;
  if(act==='go')go(val);
  else if(act==='start')startStory(val);
  else if(act==='tab')showTab(val);
  else if(act==='scav')foundScav(val);
  else if(act==='dot'){var dn=parseInt(val,10);if(!isNaN(dn))showPageN(dn);}else if(act==='idol'){var n=parseInt(val,10);if(!isNaN(n))smashIdol(n);}
  else if(act==='heal')healBird();
  else if(act==='next')nextP();else if(act==='closer')closeR();
  else if(act==='prev')prevP();
});
